<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FRIEND REQUEST</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: aqua;
        }

        * {
            box-sizing: border-box;
            font-size: arial;
        }
        html,
        body {
            height: 100%;
            width: 100%;
        }

        .container {
            width: 300px;
            height: 400px;
            background-color: aliceblue;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0px 0px 2px 1px gray;
        }

        .container img {
            height: 50%;
            width: 100%;
            padding: 10px;
            border-radius: 20px;
        }

        .container h1 {
            margin: 0;
            padding: 0;
            font-size: 40px;
        }

        .container h2 {
            color: red;
        }

        .container button {
            width: 150px;
            height: 40px;
            border-radius: 5px;
            border:none;
            background-color: blue;
            color: white;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <div class="container">
        <img src="https://images.pexels.com/photos/1391499/pexels-photo-1391499.jpeg?auto=compress&cs=tinysrgb&dpr=1&w=500 "
            alt="image not found">
        <h1>Alice</h1>
        <h2>Stranger</h2>
        <button>Add Friend</button>
    </div>
    <script>
        let a = 0;
        let btn = document.querySelector("button");
        let h2 = document.querySelector("h2")
        btn.addEventListener("click", function () {
            if (a == 0) {
                h2.innerHTML = "Friend";
                h2.style.color = "green";
                btn.innerHTML = "Remove";
                a = 1;
            }
            else {
                h2.innerHTML = "Stranger";
                h2.style.color = "red";
                btn.innerHTML = " Add Friend";
                a = 0;

            }
        })
    </script>
</body>

</html>
