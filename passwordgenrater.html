<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Genrater</title>
    <style>
        body{
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
           
        }
        *{
            box-sizing: border-box;
        }
        .container{
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, Helvetica, sans-serif;
            width: 400px;
            height: auto;
            padding:20px;
            border-radius:5px;
            flex-direction: column;
            background-color:rgb(145, 204, 227);

        }
        #password{
            width: 90%;
            height: auto;
            padding:5px;
            border-radius:5px;
            border: none;
            outline: none   ;

        }
         button{
        width:200px;
        height:35px;
        outline:none;
        border:none;
        cursor:pointer;
        color :white;
        background: rgb(71, 148, 211);
      
        border-radius: inherit;
     }
     input[type="range"]{
        accent-color:rgb(71, 148, 211);
     }
    
     @media  screen and (max-width:768px) {
        .container{
            width:98%;
        }
        
     }
    </style>
</head>
<body>

    <div class="container">
      <h1>Password Genrater</h1>
      <div class="password-content">
           <input type="text" id="password" placeholder="Your Password " >
      </div>
      <br>
      <div style="display:flex">
     <input type="range" id="range" min="0" max="100" value="6"><span id="numbers"></span>
    </div>
      <button id="btn">Genrate Password</button>
   
    </div>
    <script>
        const btn =document.querySelector("#btn");
        const password = document.querySelector("#password");
        const range = document.querySelector("#range");
        const numbers = document.querySelector("#numbers");
        range.addEventListener("input",()=>{
              numbers.textContent = range.value;
        });  
        btn.addEventListener("click", ()=>{
             let digit ="";
          const characters = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789@#$%&*";

             for(i=0;i<range.value;i++){
            const randomIndex = Math.floor(Math.random()*characters.length);
            digit += characters[randomIndex];
            
             }
            password.value = digit;
        })
    </script>
</body>
</html>
