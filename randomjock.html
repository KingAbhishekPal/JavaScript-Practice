<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random jocke Gemrater</title>
    <style>
     body{
        margin: 0;
        padding: 0;
        display:flex;
        justify-content: center;
        align-items: center;
        height:100vh;
     }
     .container{
          display:flex;
        justify-content: center;
        align-items: center;
        flex-direction: column;
        font-family: Arial, Helvetica, sans-serif;
        width:400px;
        height:auto;
        padding:10px 20px;
        box-shadow: 0px 0px 1px 1px black;
        border-radius: 15px;
     }
     .imoji{
        font-size:50px;
     }
     button{
        width:150px;
        height:40px;
        outline:none;
        border:none;
        cursor:pointer;
        color :white;
        background: black;
        font-size:20px;
        border-radius: inherit;
     }
    </style>
</head>
<body>
    <div class="container">
        <h1>Random Joke Genrator</h1>
        <div class="imoji">😂</div>
        <br>
        <div class="jokeContent">
            <!-- jocke here  -->
        </div>
        <br>
        <button id="btn">Click</button>
    </div>
    <script>
        
           let jokes = [

                "एक लड़का डॉक्टर के पास गया और बोला: डॉक्टर साहब मुझे भूलने की बीमारी हो गई है। डॉक्टर ने पूछा: कब से? लड़का बोला: कब से क्या?",

                "टीचर: अगर तुम्हारे पास 10 चॉकलेट हैं और तुम 5 दोस्त को दे दो तो तुम्हारे पास क्या बचेगा? छात्र: 5 दुश्मन।",

                "पप्पू परीक्षा देने गया। टीचर ने कहा: पेपर कठिन है लेकिन कोशिश करो। पप्पू बोला: ठीक है सर, कोशिश तो मैं भी कर रहा हूँ कि पेपर आसान हो जाए।",

                "एक आदमी डॉक्टर के पास गया और बोला: डॉक्टर साहब मुझे ऐसा लगता है कि मैं अदृश्य हो गया हूँ। डॉक्टर बोले: अगला मरीज आए।",

                "पप्पू ने अपने दोस्त से कहा: यार मैं कल रात इतना पढ़ा कि मेरी आँखों में दर्द हो गया। दोस्त बोला: फिर क्या किया? पप्पू बोला: फिर मैंने किताब बंद कर दी।",

                "टीचर: बताओ सबसे ज्यादा नशा किस चीज में होता है? छात्र: किताबों में। टीचर: कैसे? छात्र: क्योंकि किताब खोलते ही नींद आ जाती है।",

                "पत्नी: सुनो जी अगर मैं मर गई तो आप क्या करोगे? पति: मैं भी मर जाऊँगा। पत्नी: क्यों? पति: इतनी खुशी मैं सह नहीं पाऊँगा।",

                "एक आदमी ने भगवान से पूछा: भगवान जी करोड़ों साल आपके लिए कितने होते हैं? भगवान बोले: बस एक सेकंड। आदमी बोला: और करोड़ों रुपये? भगवान बोले: बस एक रुपया। आदमी बोला: तो भगवान जी मुझे एक रुपया दे दीजिए। भगवान बोले: एक सेकंड रुको।",

                "पप्पू ने नई नौकरी जॉइन की। बॉस बोला: यहाँ काम बहुत मेहनत से करना पड़ता है। पप्पू बोला: सर चिंता मत कीजिए, मैं मेहनत से काम से बचने के सारे तरीके जानता हूँ।",

                "एक आदमी ट्रेन में बैठा था। सामने बैठे बच्चे ने पूछा: अंकल आपका नाम क्या है? आदमी बोला: मेरा नाम Google है। बच्चा बोला: क्यों? आदमी बोला: क्योंकि मेरी पत्नी मुझसे हर चीज पूछती है।",

                "टीचर: अगर पृथ्वी घूमना बंद कर दे तो क्या होगा? छात्र: सर हम सब गिर जाएंगे। टीचर: क्यों? छात्र: क्योंकि स्कूल से छुट्टी हो जाएगी।",

                "पप्पू: यार मुझे लगता है मैं बहुत स्मार्ट हूँ। दोस्त: क्यों? पप्पू: क्योंकि जब भी मैं पढ़ने बैठता हूँ मुझे तुरंत नींद आ जाती है।",

                "एक आदमी ने होटल में खाना खाया। वेटर बोला: सर खाना कैसा लगा? आदमी बोला: इतना अच्छा कि अगर घर में बनता तो मैं कभी यहाँ नहीं आता।",

                "टीचर: बताओ बिजली कहाँ से आती है? छात्र: मामा के घर से। टीचर: कैसे? छात्र: क्योंकि जब भी बिजली जाती है पापा कहते हैं कि साले मामा ने फिर बिजली काट दी।",

                "पप्पू ने अपने दोस्त से कहा: यार मुझे लगता है मैं बहुत अमीर बन जाऊँगा। दोस्त: कैसे? पप्पू: क्योंकि मेरे सपनों में हमेशा करोड़ों रुपये आते हैं।",

                "एक आदमी ने डॉक्टर से कहा: डॉक्टर साहब मुझे लगता है कि मैं कुत्ता बन गया हूँ। डॉक्टर ने पूछा: कब से? आदमी बोला: जब से मैं पप्पी था।",

                "टीचर: बताओ आलस क्या होता है? छात्र: सर जब कुछ करने का मन न करे और फिर भी न करें तो उसे आलस कहते हैं।",

                "पप्पू: यार मुझे समझ नहीं आता लोग शादी क्यों करते हैं। दोस्त: क्यों? पप्पू: क्योंकि शादी के बाद वही लोग कहते हैं कि पहले मैं बहुत खुश था।",

                "एक लड़का अपने दोस्त से बोला: यार अगर पढ़ाई से पैसा मिलता तो मैं आज करोड़पति होता। दोस्त बोला: कैसे? लड़का बोला: क्योंकि मैं पढ़ाई के बारे में रोज सोचता हूँ।",

                "पप्पू: मम्मी आज स्कूल में बहुत मज़ा आया। मम्मी: क्यों? पप्पू: क्योंकि आज टीचर नहीं आए थे।"

            ];
        const btn = document.querySelector("#btn");
        const jockcontent = document.querySelector(".jokeContent");
        btn.addEventListener("click",()=>{
            let index = Math.floor(Math.random()*jokes.length);
            jockcontent.textContent = jokes[index];
        });
    </script>
</body>
</html>
